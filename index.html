<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunzu Secondary School - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Login Screen */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 400px;
            text-align: center;
        }

        .login-box h2 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .login-box h3 {
            color: #764ba2;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }

        .login-box button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            color: red;
            margin-top: 10px;
            font-size: 14px;
        }

        .success-message {
            color: green;
            margin-top: 10px;
            font-size: 14px;
        }

        /* Dashboard Layout */
        .dashboard-container {
            display: none;
        }

        .sidebar {
            width: 280px;
            background: white;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }

        .sidebar-header h3 {
            margin: 10px 0 5px;
        }

        .sidebar-header p {
            font-size: 12px;
            opacity: 0.8;
        }

        .sidebar-nav {
            padding: 20px 0;
        }

        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #555;
        }

        .nav-item:hover, .nav-item.active {
            background: #f0f0f0;
            color: #667eea;
            border-left: 4px solid #667eea;
        }

        .main-content {
            margin-left: 280px;
            padding: 20px;
        }

        .top-bar {
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card h3 {
            color: #667eea;
            margin-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
            display: block;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f5f5f5;
            color: #667eea;
            font-weight: bold;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }

        .badge-info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }

        select, input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        .menu-toggle {
            display: none;
            font-size: 24px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
                z-index: 1000;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .menu-toggle {
                display: block;
            }
            table {
                font-size: 12px;
            }
            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginContainer" class="login-container">
        <div class="login-box">
            <h2>🏫 Lunzu Secondary School</h2>
            <h3>Admin Dashboard</h3>
            <input type="text" id="username" placeholder="Username" autocomplete="off">
            <input type="password" id="password" placeholder="Password">
            <div id="loginError" class="error-message"></div>
            <button onclick="login()" id="loginBtn">Login</button>
            <p style="margin-top: 20px; font-size: 12px; color: #999;">Authorized Personnel Only</p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardContainer" class="dashboard-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>🏫 Lunzu Secondary</h3>
                <p>Admin Dashboard</p>
            </div>
            <div class="sidebar-nav">
                <div class="nav-item active" data-page="dashboard">
                    📊 Dashboard
                </div>
                <div class="nav-item" data-page="students">
                    👨‍🎓 Student Management
                </div>
                <div class="nav-item" data-page="feeBalances">
                    💰 Fee Balances
                </div>
                <div class="nav-item" data-page="classPerformance">
                    📈 Class Performance
                </div>
                <div class="nav-item" data-page="subjectAnalysis">
                    📚 Subject Analysis
                </div>
                <div class="nav-item" data-page="reports">
                    📄 Reports
                </div>
                <div class="nav-item" data-page="settings">
                    ⚙️ Settings
                </div>
                <div class="nav-item" onclick="logout()">
                    🚪 Logout
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <div class="menu-toggle" onclick="toggleSidebar()">☰</div>
                <h2 id="pageTitle">Dashboard</h2>
                <div>
                    <span id="lastUpdate"></span>
                    <button class="btn btn-sm btn-primary" onclick="refreshData()">🔄 Refresh</button>
                </div>
            </div>

            <div id="contentArea">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading dashboard...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - UPDATE THIS URL
        // ============================================
        const API_URL = 'https://script.google.com/macros/s/AKfycbwHd4v3_XBW_YX0k8WEYU_GCVDGAHT9Aa_phmcXibZqBUL3x2wLmW_sCp9WzG6Kr1WU/exec';
        
        // Global variables
        let authToken = null;
        let cache = new Map();
        let currentPage = 'dashboard';

        // ============================================
        // LOGIN FUNCTION - FIXED
        // ============================================
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            
            // Clear previous error
            loginError.textContent = '';
            
            if (!username || !password) {
                loginError.textContent = 'Please enter username and password';
                return;
            }
            
            // Show loading state
            const originalText = loginBtn.textContent;
            loginBtn.textContent = 'Logging in...';
            loginBtn.disabled = true;
            
            try {
                console.log('Attempting login for:', username);
                
                // Call the login action
                const result = await apiCall('login', { username, password }, false);
                
                console.log('Login response:', result);
                
                if (result && result.success) {
                    authToken = result.authToken;
                    loginError.textContent = '';
                    loginError.className = 'success-message';
                    loginError.textContent = 'Login successful! Redirecting...';
                    
                    // Hide login, show dashboard
                    setTimeout(() => {
                        document.getElementById('loginContainer').style.display = 'none';
                        document.getElementById('dashboardContainer').style.display = 'block';
                        loadPage('dashboard');
                    }, 500);
                } else {
                    loginError.className = 'error-message';
                    loginError.textContent = result?.error || 'Invalid username or password';
                }
            } catch (error) {
                console.error('Login error:', error);
                loginError.className = 'error-message';
                loginError.textContent = 'Connection error: ' + error.message;
            } finally {
                loginBtn.textContent = originalText;
                loginBtn.disabled = false;
            }
        }

        // ============================================
        // API CALL FUNCTION - WITH JSONP
        // ============================================
        async function apiCall(action, params = {}, useCache = true) {
            const cacheKey = `${action}_${JSON.stringify(params)}`;
            
            if (useCache && cache.has(cacheKey)) {
                const cached = cache.get(cacheKey);
                if (Date.now() - cached.timestamp < 300000) {
                    return cached.data;
                }
            }
            
            return new Promise((resolve, reject) => {
                const url = new URL(API_URL);
                url.searchParams.append('action', action);
                url.searchParams.append('callback', 'handleResponse');
                
                if (authToken) {
                    url.searchParams.append('authToken', authToken);
                }
                
                Object.keys(params).forEach(key => {
                    if (params[key] !== undefined && params[key] !== null && params[key] !== '') {
                        url.searchParams.append(key, params[key]);
                    }
                });
                
                // Set timeout
                const timeoutId = setTimeout(() => {
                    reject(new Error('Request timeout'));
                }, 30000);
                
                // Define callback
                window.handleResponse = function(response) {
                    clearTimeout(timeoutId);
                    if (response && response.success !== undefined) {
                        cache.set(cacheKey, {
                            data: response,
                            timestamp: Date.now()
                        });
                        resolve(response);
                    } else {
                        reject(new Error('Invalid response format'));
                    }
                };
                
                // Create and send JSONP request
                const script = document.createElement('script');
                script.src = url.toString();
                script.onerror = function() {
                    clearTimeout(timeoutId);
                    reject(new Error('API call failed - check if Apps Script is deployed correctly'));
                };
                document.head.appendChild(script);
                
                // Clean up after load
                script.onload = function() {
                    setTimeout(() => {
                        document.head.removeChild(script);
                    }, 100);
                };
            });
        }

        // ============================================
        // LOGOUT FUNCTION
        // ============================================
        async function logout() {
            if (authToken) {
                await apiCall('logout', {}, false);
            }
            authToken = null;
            cache.clear();
            document.getElementById('dashboardContainer').style.display = 'none';
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // ============================================
        // PAGE LOADING FUNCTIONS
        // ============================================
        async function loadPage(page) {
            currentPage = page;
            
            // Update active nav item
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('data-page') === page) {
                    item.classList.add('active');
                }
            });
            
            document.getElementById('pageTitle').innerText = getPageTitle(page);
            document.getElementById('contentArea').innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';
            
            try {
                switch(page) {
                    case 'dashboard':
                        await loadDashboard();
                        break;
                    case 'students':
                        await loadStudentManagement();
                        break;
                    case 'feeBalances':
                        await loadFeeBalances();
                        break;
                    case 'classPerformance':
                        await loadClassPerformance();
                        break;
                    case 'subjectAnalysis':
                        await loadSubjectAnalysis();
                        break;
                    case 'reports':
                        await loadReports();
                        break;
                    case 'settings':
                        await loadSettings();
                        break;
                    default:
                        await loadDashboard();
                }
            } catch (error) {
                document.getElementById('contentArea').innerHTML = `<div class="card"><p style="color: red;">Error: ${error.message}</p></div>`;
            }
            
            document.getElementById('lastUpdate').innerHTML = `Last updated: ${new Date().toLocaleTimeString()}`;
        }

        function getPageTitle(page) {
            const titles = {
                dashboard: 'Dashboard',
                students: 'Student Management',
                feeBalances: 'Fee Balances',
                classPerformance: 'Class Performance',
                subjectAnalysis: 'Subject Analysis',
                reports: 'Reports',
                settings: 'Settings'
            };
            return titles[page] || 'Dashboard';
        }

        // ============================================
        // DASHBOARD PAGE
        // ============================================
        async function loadDashboard() {
            const stats = await apiCall('getDashboardStats');
            
            if (!stats.success) {
                document.getElementById('contentArea').innerHTML = `<div class="card">Error: ${stats.error}</div>`;
                return;
            }
            
            const html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Students</h3>
                        <div class="value">${stats.totalStudents || 0}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Classes</h3>
                        <div class="value">${stats.totalClasses || 0}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Overall Average</h3>
                        <div class="value">${stats.overallAverage || 0}%</div>
                    </div>
                    <div class="stat-card">
                        <h3>Pass Rate</h3>
                        <div class="value">${stats.passRate || 0}%</div>
                    </div>
                    <div class="stat-card">
                        <h3>Fee Collection</h3>
                        <div class="value">${stats.feeCollectionRate || 0}%</div>
                    </div>
                    <div class="stat-card">
                        <h3>Outstanding Fees</h3>
                        <div class="value">K${formatNumber(stats.totalOutstandingFees || 0)}</div>
                    </div>
                </div>
                
                <div class="card">
                    <h3>📊 Class Performance Overview</h3>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr><th>Class</th><th>Students</th><th>Average Score</th><th>Status</th></tr>
                            </thead>
                            <tbody>
                                ${Object.entries(stats.classStats || {}).map(([className, data]) => `
                                    <tr>
                                        <td>${className}</td>
                                        <td>${data.studentCount || 0}</td>
                                        <td>${data.averageScore || 0}%</td>
                                        <td><span class="badge ${(data.averageScore || 0) >= 60 ? 'badge-success' : 'badge-warning'}">${(data.averageScore || 0) >= 60 ? 'Good' : 'Needs Improvement'}</span></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            document.getElementById('contentArea').innerHTML = html;
        }

        // ============================================
        // STUDENT MANAGEMENT PAGE
        // ============================================
        async function loadStudentManagement() {
            const classes = await getClassList();
            
            const html = `
                <div class="card">
                    <h3>👨‍🎓 Student Management</h3>
                    <div class="filter-bar">
                        <select id="classSelect" onchange="loadStudentList()">
                            <option value="">Select Class</option>
                            ${classes.map(c => `<option value="${c}">${c}</option>`).join('')}
                        </select>
                        <input type="text" id="searchInput" placeholder="Search student..." onkeyup="filterStudents()">
                        <button class="btn btn-primary" onclick="exportStudentList()">📥 Export CSV</button>
                    </div>
                    <div id="studentListContainer">
                        <p>Select a class to view students</p>
                    </div>
                </div>
            `;
            
            document.getElementById('contentArea').innerHTML = html;
        }

        async function loadStudentList() {
            const className = document.getElementById('classSelect').value;
            if (!className) return;
            
            document.getElementById('studentListContainer').innerHTML = '<div class="spinner"></div>';
            
            const students = await apiCall('getStudentList', { className });
            
            if (!students.success && students.error) {
                document.getElementById('studentListContainer').innerHTML = `<p>Error: ${students.error}</p>`;
                return;
            }
            
            const studentArray = Array.isArray(students) ? students : (students.students || []);
            
            if (studentArray.length === 0) {
                document.getElementById('studentListContainer').innerHTML = '<p>No students found in this class</p>';
                return;
            }
            
            const html = `
                <div style="overflow-x: auto;">
                    <table id="studentTable">
                        <thead>
                            <tr><th>#</th><th>Student Name</th><th>Average</th><th>Position</th><th>Fee Balance</th><th>Status</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            ${studentArray.map((student, index) => `
                                <tr>
                                    <td>${index + 1}</td>
                                    <td>${student.name || 'N/A'}</td>
                                    <td>${student.averageScore || 0}%</td>
                                    <td>${student.overallPosition || '-'}</td>
                                    <td>K${formatNumber(student.feeBalance || 0)}</td>
                                    <td><span class="badge ${(student.feeBalance || 0) > 0 ? 'badge-danger' : 'badge-success'}">${(student.feeBalance || 0) > 0 ? 'Has Balance' : 'Clear'}</span></td>
                                    <td>
                                        <button class="btn btn-sm btn-primary" onclick="viewStudentDetails('${student.name}', '${className}')">View</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            
            document.getElementById('studentListContainer').innerHTML = html;
        }

        // ============================================
        // FEE BALANCES PAGE
        // ============================================
        async function loadFeeBalances() {
            document.getElementById('contentArea').innerHTML = '<div class="spinner"></div>';
            
            const feeData = await apiCall('getFeeBalanceReport');
            
            if (!feeData.success) {
                document.getElementById('contentArea').innerHTML = `<div class="card">Error: ${feeData.error}</div>`;
                return;
            }
            
            const students = feeData.students || [];
            const studentsWithBalance = students.filter(s => (s.feeBalance || 0) > 0);
            
            const html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Outstanding</h3>
                        <div class="value">K${formatNumber(feeData.summary?.totalOutstanding || 0)}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Students with Balance</h3>
                        <div class="value">${feeData.summary?.studentsWithBalance || 0}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Average Balance</h3>
                        <div class="value">K${formatNumber(feeData.summary?.averageBalance || 0)}</div>
                    </div>
                </div>
                
                <div class="card">
                    <h3>💰 Fee Balance Report</h3>
                    <div class="filter-bar">
                        <input type="text" id="feeSearch" placeholder="Search student..." onkeyup="filterFeeTable()">
                        <button class="btn btn-primary" onclick="exportFeeReport()">📥 Export Report</button>
                    </div>
                    <div style="overflow-x: auto;">
                        <table id="feeTable">
                            <thead>
                                <tr><th>#</th><th>Student Name</th><th>Class</th><th>Fee Balance</th><th>Average Score</th><th>Status</th><th>Action</th></tr>
                            </thead>
                            <tbody>
                                ${studentsWithBalance.map((student, index) => `
                                    <tr>
                                        <td>${index + 1}</td>
                                        <td>${student.name || 'N/A'}</td>
                                        <td>${student.className || 'N/A'}</td>
                                        <td style="color: red; font-weight: bold;">K${formatNumber(student.feeBalance || 0)}</td>
                                        <td>${student.averageScore || 0}%</td>
                                        <td><span class="badge badge-danger">Overdue</span></td>
                                        <td>
                                            <button class="btn btn-sm btn-primary" onclick="viewStudentDetails('${student.name}', '${student.className}')">View</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            document.getElementById('contentArea').innerHTML = html;
        }

        // ============================================
        // CLASS PERFORMANCE PAGE
        // ============================================
        async function loadClassPerformance() {
            const classes = await getClassList();
            
            const html = `
                <div class="card">
                    <h3>📈 Class Performance Analysis</h3>
                    <div class="filter-bar">
                        <select id="perfClassSelect" onchange="loadClassPerformanceData()">
                            <option value="">Select Class</option>
                            ${classes.map(c => `<option value="${c}">${c}</option>`).join('')}
                        </select>
                        <div id="classPerformanceContainer">
                            <p>Select a class to view performance</p>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('contentArea').innerHTML = html;
        }

        async function loadClassPerformanceData() {
            const className = document.getElementById('perfClassSelect').value;
            if (!className) return;
            
            document.getElementById('classPerformanceContainer').innerHTML = '<div class="spinner"></div>';
            
            const performance = await apiCall('getClassPerformance', { className });
            
            if (!performance.success) {
                document.getElementById('classPerformanceContainer').innerHTML = `<p>Error: ${performance.error}</p>`;
                return;
            }
            
            const html = `
                <div class="stats-grid">
                    <div class="stat-card">

                    <div class="stat-card">
                        <h3>Distinction Rate</h3>

        // ============================================
        // SUBJECT ANALYSIS PAGE
        // ============================================
        async function loadSubjectAnalysis() {
            const classes = await getClassList();
            
            const html = `
                <div class="card">
                    <h3>📚 Subject Performance Analysis</h3>
                    <div class="filter-bar">
                        <select id="subjClassSelect" onchange="loadSubjectList()">
                            <option value="">Select Class</option>
                            ${classes.map(c => `<option value="${c}">${c}</option>`).join('')}
                        </select>
                        <select id="subjectNameSelect" onchange="loadSubjectAnalysisData()" disabled>
                            <option value="">Select Subject</option>
                        </select>
                    </div>
                    <div id="subjectAnalysisContainer">
                        <p>Select a class and subject to view analysis</p>
                    </div>
                </div>
            `;
            
            document.getElementById('contentArea').innerHTML = html;
        }

        async function loadSubjectList() {
            const className = document.getElementById('subjClassSelect').value;
            if (!className) return;
            
            const performance = await apiCall('getClassPerformance', { className });
            
            const subjectSelect = document.getElementById('subjectNameSelect');
            if (performance.subjectAnalysis && Object.keys(performance.subjectAnalysis).length > 0) {
                subjectSelect.disabled = false;
                subjectSelect.innerHTML = '<option value="">Select Subject</option>' + 
                    Object.keys(performance.subjectAnalysis).map(s => `<option value="${s}">${s}</option>`).join('');
            }
        }

        async function loadSubjectAnalysisData() {
            const className = document.getElementById('subjClassSelect').value;
            const subjectName = document.getElementById('subjectNameSelect').value;
            
            if (!className || !subjectName) return;
            
            document.getElementById('subjectAnalysisContainer').innerHTML = '<div class="spinner"></div>';
            
            const analysis = await apiCall('getSubjectAnalysis', { className, subjectName });
            
            if (!analysis.success) {
                document.getElementById('subjectAnalysisContainer').innerHTML = `<p>Error: ${analysis.error}</p>`;
                return;
            }
            
            const html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Average Score</h3>
                        <div class="value">${analysis.statistics?.average || 0}%</div>
                    </div>
                    <div class="stat-card">
                        <h3>Pass Rate</h3>
                        <div class="value">${analysis.statistics?.passRate || 0}%</div>
                    </div>
                    <div class="stat-card">
                        <h3>Highest Score</h3>
                        <div class="value">${analysis.topScore || 0}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Lowest Score</h3>
                        <div class="value">${analysis.lowestScore || 0}</div>
                    </div>
                </div>
                
                <div class="card">
                    <h3>👨‍🎓 Student Scores</h3>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead><tr><th>Rank</th><th>Student Name</th><th>Score</th><th>Grade</th><th>Fee Status</th></tr></thead>
                            <tbody>
                                ${(analysis.studentScores || []).map((student, idx) => `
                                    <tr>
                                        <td>${idx + 1}</td>
                                        <td>${student.name || 'N/A'}</td>
                                        <td>${student.score || 0}</td>
                                        <td>${student.grade || '-'}</td>
                                        <td><span class="badge ${(student.feeBalance || 0) > 0 ? 'badge-danger' : 'badge-success'}">${(student.feeBalance || 0) > 0 ? 'Has Balance' : 'Clear'}</span></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            document.getElementById('subjectAnalysisContainer').innerHTML = html;
        }

        // ============================================
        // REPORTS PAGE
        // ============================================
        async function loadReports() {
            const classes = await getClassList();
            
            const html = `
                <div class="card">
                    <h3>📄 Generate Reports</h3>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>School Report</h3>
                            <p>Complete school performance summary</p>
                            <button class="btn btn-primary" onclick="generateFullSchoolReport()">Generate</button>
                        </div>
                        <div class="stat-card">

                        </div>
                        <div class="stat-card">
                            <h3>Fee Report</h3>

                            <button class="btn btn-primary" onclick="generateFeeReportPDF()">Generate</button>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <h3>📊 Subject Ranking (All Classes)</h3>

        async function loadSubjectRanking() {
            const ranking = await apiCall('getSubjectRanking');
            
            if (!ranking.success) {
                document.getElementById('subjectRankingContainer').innerHTML = `<p>Error: ${ranking.error}</p>`;

                <div style="overflow-x: auto;">
                    <table>

                        </thead>
                        <tbody>
                            ${(ranking.data || []).map((subject, idx) => `

                                    <td>${subject.bestClass ? `${subject.bestClass[0]} (${subject.bestClass[1]}%)` : 'N/A'}</td>
                                    <td>${subject.worstClass ? `${subject.worstClass[0]} (${subject.worstClass[1]}%)` : 'N/A'}</td>

        // ============================================
        // SETTINGS PAGE
        // ============================================
        async function loadSettings() {
            const html = `
                <div class="card">
                    <h3>⚙️ System Settings</h3>
                    <div style="padding: 20px;">
                        <div style="margin-bottom: 20px;">
                            <h4>Cache Management</h4>
                            <button class="btn btn-primary" onclick="clearCache()">Clear All Cache</button>
                            <p style="margin-top: 10px; font-size: 12px; color: #666;">Clearing cache will force fresh data on next load</p>
                        </div>
                        
                        <div style="margin-bottom: 20px;">
                            <h4>System Information</h4>
                            <table style="width: auto;">
                                <tr><th>Version:</th><td>2.0.0</td></tr>
                                <tr><th>Last Updated:</th><td>${new Date().toLocaleString()}</td></tr>
                                <tr><th>Cache Size:</th><td>${cache.size} items</td></tr>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('contentArea').innerHTML = html;
        }

        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        async function getClassList() {
            try {
                const stats = await apiCall('getDashboardStats');
                return Object.keys(stats.classStats || {});
            } catch (error) {
                console.error('Error getting class list:', error);
                return [];
            }
        }

        function formatNumber(num) {
            if (!num || isNaN(num)) return '0';
            return num.toLocaleString();
        }

        async function viewStudentDetails(name, className) {
            const details = await apiCall('getStudentDetails', { studentName: name, studentClass: className });
            
            if (!details.success) {
                alert('Error loading student details');
                return;
            }
            
            const student = details.student;
            const subjectsHtml = (student.subjects || [])
                .filter(s => s.score)
                .map(subj => `<tr><td>${subj.name}</td><td>${subj.score}</td><td>${subj.grade || '-'}</td></tr>`)
                .join('');
            
            const modalHtml = `
                <div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: flex; align-items: center; justify-content: center;">
                    <div style="background: white; border-radius: 10px; width: 90%; max-width: 800px; max-height: 80vh; overflow-y: auto; padding: 20px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                            <h3>Student Details: ${student.name}</h3>
                            <button onclick="this.closest('div').parentElement.remove()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
                        </div>
                        
                        <div class="stats-grid">
                            <div class="stat-card"><h3>Class</h3><div class="value">${student.className}</div></div>
                            <div class="stat-card"><h3>Average</h3><div class="value">${student.averageScore}%</div></div>
                            <div class="stat-card"><h3>Ranking</h3><div class="value">${student.classRanking || '-'}/${student.classSize || '-'}</div></div>
                            <div class="stat-card"><h3>Fee Balance</h3><div class="value" style="color: ${student.feeBalance > 0 ? 'red' : 'green'}">K${formatNumber(student.feeBalance)}</div></div>
                        </div>
                        
                        <div class="card">
                            <h3>Subject Performance</h3>
                            <table><thead><tr><th>Subject</th><th>Score</th><th>Grade</th></tr></thead>
                            <tbody>${subjectsHtml || '<tr><td colspan="3">No subjects found</td></tr>'}</tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        async function generateFullSchoolReport() {
            const result = await apiCall('generatePDFReport', { pdfType: 'school_report' });
            
            if (result.success && result.pdfData) {
                const link = document.createElement('a');
                link.href = 'data:application/pdf;base64,' + result.pdfData;
                link.download = `School_Report_${new Date().toISOString().split('T')[0]}.pdf`;
                link.click();
            } else {
                alert('Error generating report: ' + (result.error || 'Unknown error'));
            }
        }

        async function generateClassReportPDF() {
            const className = document.getElementById('reportClassSelect').value;
            if (!className) {
                alert('Please select a class');
                return;
            }
            
            const result = await apiCall('generatePDFReport', { pdfType: 'class_performance', className });
            
            if (result.success && result.pdfData) {
                const link = document.createElement('a');
                link.href = 'data:application/pdf;base64,' + result.pdfData;
                link.download = `${className}_Performance_Report.pdf`;
                link.click();
            } else {
                alert('Error generating report');
            }
        }

        async function generateFeeReportPDF() {
            const result = await apiCall('generatePDFReport', { pdfType: 'fee_report' });
            
            if (result.success && result.pdfData) {
                const link = document.createElement('a');
                link.href = 'data:application/pdf;base64,' + result.pdfData;
                link.download = `Fee_Report_${new Date().toISOString().split('T')[0]}.pdf`;
                link.click();
            } else {
                alert('Error generating report');
            }
        }

        function filterStudents() {
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const table = document.getElementById('studentTable');
            if (!table) return;
            
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const name = row.cells[1]?.innerText.toLowerCase() || '';
                row.style.display = name.includes(searchTerm) ? '' : 'none';
            });
        }

        function filterFeeTable() {
            const searchTerm = document.getElementById('feeSearch')?.value.toLowerCase() || '';
            const table = document.getElementById('feeTable');
            if (!table) return;
            
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const name = row.cells[1]?.innerText.toLowerCase() || '';
                row.style.display = name.includes(searchTerm) ? '' : 'none';
            });
        }

        function exportStudentList() {
            const table = document.getElementById('studentTable');
            if (!table) return;
            
            let csv = [];
            const headers = ['#', 'Student Name', 'Average', 'Position', 'Fee Balance', 'Status'];
            csv.push(headers.join(','));
            
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const rowData = [];
                for (let i = 0; i < row.cells.length - 1; i++) {
                    let text = row.cells[i]?.innerText || '';
                    text = text.replace(/"/g, '""');
                    rowData.push(`"${text}"`);
                }
                csv.push(rowData.join(','));
            });
            
            const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Students_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function exportFeeReport() {
            const table = document.getElementById('feeTable');
            if (!table) return;
            
            let csv = [];
            const headers = ['#', 'Student Name', 'Class', 'Fee Balance', 'Average Score', 'Status'];
            csv.push(headers.join(','));
            
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const rowData = [];
                for (let i = 0; i < row.cells.length - 1; i++) {
                    let text = row.cells[i]?.innerText || '';
                    text = text.replace(/"/g, '""');
                    rowData.push(`"${text}"`);
                }
                csv.push(rowData.join(','));
            });
            
            const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Fee_Report_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearCache() {
            cache.clear();
            alert('Cache cleared successfully');
            refreshData();
        }

        async function refreshData() {
            await apiCall('clearCache', {}, false);
            cache.clear();
            loadPage(currentPage);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Initialize navigation
        document.querySelectorAll('.nav-item[data-page]').forEach(item => {
            item.addEventListener('click', () => {
                loadPage(item.getAttribute('data-page'));
                if (window.innerWidth <= 768) {
                    toggleSidebar();
                }
            });
        });

        // Auto-refresh every 5 minutes
        setInterval(() => {
            if (authToken && currentPage && document.getElementById('dashboardContainer').style.display !== 'none') {
                refreshData();
            }
        }, 300000);
    </script>
